<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관세청 환율 자동 발송기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      padding: 30px 16px;
      color: #1e293b;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 4px;
      color: #1a56db;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 22px 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label { font-size: 13px; color: #475569; display: block; margin-bottom: 4px; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 7px;
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #1a56db; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; margin-bottom: 0; }
    button {
      padding: 9px 16px;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #1a56db; color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; padding: 5px 10px; font-size: 12px; }
    .btn-send    { background: #10b981; color: #fff; width: 100%; padding: 11px; font-size: 15px; }
    .email-list  { list-style: none; margin-top: 12px; }
    .email-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f8fafc;
      border-radius: 7px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .rate-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }
    .rate-box {
      background: #f0f4ff;
      border-radius: 8px;
      padding: 14px 16px;
      text-align: center;
    }
    .rate-box .currency { font-size: 13px; color: #64748b; margin-bottom: 4px; }
    .rate-box .value    { font-size: 20px; font-weight: 700; color: #1a56db; }
    .rate-box .unit     { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .status-msg {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      display: none;
    }
    .status-ok  { background: #d1fae5; color: #065f46; }
    .status-err { background: #fee2e2; color: #991b1b; }
    .cron-badge {
      display: inline-block;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      margin-top: 8px;
    }
    .loading { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>

<h1>📊 관세청 환율 자동 발송기</h1>
<p class="subtitle">매주 금요일 11:00 AM · USD · CNY · JPY · EUR</p>

<!-- 현재 환율 -->
<div class="card">
  <h2>💱 현재 관세청 환율</h2>
  <div class="rate-grid" id="rateGrid">
    <div class="rate-box"><div class="currency">USD</div><div class="value">-</div></div>
    <div class="rate-box"><div class="currency">CNY</div><div class="value">-</div></div>
    <div class="rate-box"><div class="currency">JPY</div><div class="value">-</div></div>
    <div class="rate-box"><div class="currency">EUR</div><div class="value">-</div></div>
  </div>
  <button class="btn-primary" style="margin-top:14px;width:100%;" onclick="loadRates()">🔄 새로고침</button>
</div>

<!-- Gmail 설정 -->
<div class="card">
  <h2>⚙️ Gmail 발송 계정 설정</h2>
  <label>Gmail 주소</label>
  <input type="email" id="gmailUser" placeholder="example@gmail.com" />
  <label>앱 비밀번호 <span style="font-size:11px;color:#94a3b8;">(Gmail → 2단계 인증 → 앱 비밀번호)</span></label>
  <input type="password" id="gmailPass" placeholder="앱 비밀번호 16자리" />
  <div id="savedBadge" style="display:none;background:#d1fae5;color:#065f46;border-radius:7px;padding:8px 12px;font-size:13px;margin-bottom:10px;">
    ✅ Gmail 계정·앱 비밀번호가 저장되어 있습니다. 변경할 때만 다시 입력하세요.
  </div>
  <button class="btn-primary" onclick="saveConfig()">저장</button>
  <div id="configMsg" class="status-msg"></div>
</div>

<!-- 수신자 관리 -->
<div class="card">
  <h2>📧 수신자 이메일 목록</h2>
  <div class="row">
    <input type="email" id="newEmail" placeholder="추가할 이메일 주소" onkeydown="if(event.key==='Enter')addEmail()" />
    <button class="btn-primary" onclick="addEmail()">추가</button>
  </div>
  <ul class="email-list" id="emailList"></ul>
  <div id="emailMsg" class="status-msg"></div>
</div>

<!-- 발송 -->
<div class="card">
  <h2>📨 즉시 발송 테스트</h2>
  <p style="font-size:13px;color:#64748b;margin-bottom:12px;">
    지금 바로 환율 이메일을 발송합니다. 설정된 수신자 전체에게 전송됩니다.
  </p>
  <button class="btn-send" onclick="sendNow()">지금 발송하기</button>
  <div style="text-align:center;">
    <span class="cron-badge">🕐 자동 발송: 매주 금요일 오전 11:00 (KST)</span>
  </div>
  <div id="sendMsg" class="status-msg"></div>
</div>

<script>
  async function loadRates() {
    const grid = document.getElementById('rateGrid');
    grid.classList.add('loading');
    try {
      const data = await fetch('/api/rates').then(r => r.json());
      const currencies = ['USD', 'CNY', 'JPY', 'EUR'];
      const boxes = grid.querySelectorAll('.rate-box');
      currencies.forEach((c, i) => {
        const d = data[c];
        const unit = `1${c}`;
        const changeNum = d && d.change != null ? parseFloat(d.change) : null;
        const arrow = changeNum == null ? '' : changeNum > 0 ? '▲' : changeNum < 0 ? '▼' : '–';
        const color = changeNum == null || changeNum === 0 ? '#888' : changeNum > 0 ? '#ef4444' : '#3b82f6';
        const decimals = d && d.rate < 100 ? 4 : 2;
        const prevStr = d && d.prev != null ? Number(d.prev).toLocaleString('ko-KR', { maximumFractionDigits: 4 }) : '';
        const changeHtml = changeNum != null && prevStr
          ? `<div style="font-size:11px;color:#64748b;margin-top:3px;">전주 ${prevStr} <span style="color:${color};">(${arrow} ${Math.abs(changeNum).toFixed(decimals)})</span></div>`
          : '';
        boxes[i].innerHTML = d ? `
          <div class="currency">${c}</div>
          <div class="value">${Number(d.rate).toLocaleString('ko-KR', { maximumFractionDigits: 4 })}</div>
          <div class="unit">${unit} = 원</div>
          ${changeHtml}`
        : `<div class="currency">${c}</div><div class="value">-</div><div class="unit">데이터 없음</div>`;
      });
    } catch(e) {
      console.error(e);
    }
    grid.classList.remove('loading');
  }

  async function saveConfig() {
    const user = document.getElementById('gmailUser').value.trim();
    const pass = document.getElementById('gmailPass').value.trim();
    if (!user || !pass) return showMsg('configMsg', '이메일과 비밀번호를 모두 입력하세요.', true);
    if (pass === PASS_MASK) {
      return showMsg('configMsg', '이미 저장되어 있습니다. 비밀번호를 바꾸려면 새 값을 입력하세요.', false);
    }
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ gmailUser: user, gmailPass: pass })
    }).then(r => r.json());
    showMsg('configMsg', res.ok ? '✅ 저장 완료' : res.error, !res.ok);
    if (res.ok) loadConfig();
  }

  async function loadEmails() {
    const list = await fetch('/api/emails').then(r => r.json());
    renderEmails(list);
  }

  function renderEmails(list) {
    const ul = document.getElementById('emailList');
    ul.innerHTML = list.length === 0
      ? '<li style="color:#94a3b8;font-size:13px;">등록된 수신자가 없습니다.</li>'
      : list.map(e => `
          <li>
            <span>${e}</span>
            <button class="btn-danger" onclick="removeEmail('${e}')">삭제</button>
          </li>`).join('');
  }

  async function addEmail() {
    const input = document.getElementById('newEmail');
    const email = input.value.trim();
    if (!email) return;
    const res = await fetch('/api/emails', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    }).then(r => r.json());
    if (res.ok) { input.value = ''; renderEmails(res.emails); showMsg('emailMsg', '✅ 추가됨', false); }
    else showMsg('emailMsg', res.error, true);
  }

  async function removeEmail(email) {
    const res = await fetch(`/api/emails/${encodeURIComponent(email)}`, { method: 'DELETE' }).then(r => r.json());
    if (res.ok) renderEmails(res.emails);
  }

  async function sendNow() {
    showMsg('sendMsg', '⏳ 발송 중...', false);
    const res = await fetch('/api/send-now', { method: 'POST' }).then(r => r.json());
    if (res.ok) showMsg('sendMsg', `✅ 발송 완료! (수신자 ${res.recipients}명)`, false);
    else showMsg('sendMsg', `❌ ${res.error}`, true);
  }

  function showMsg(id, text, isErr) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = 'status-msg ' + (isErr ? 'status-err' : 'status-ok');
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  const PASS_MASK = '****************';

  async function loadConfig() {
    const c = await fetch('/api/config').then(r => r.json());
    if (c.gmailUser) document.getElementById('gmailUser').value = c.gmailUser;
    if (c.hasPass) {
      // 저장된 비밀번호가 있으면 마스킹된 값으로 채워서 표시
      document.getElementById('gmailPass').value = PASS_MASK;
      document.getElementById('savedBadge').style.display = 'block';
    }
  }

  loadConfig();
  loadEmails();
  loadRates();
</script>
</body>
</html>
